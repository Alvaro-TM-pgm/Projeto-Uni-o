<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administração</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f4f6f9;
    margin:0;
}

header{
    background:#1f4e79;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    max-width:800px;
    margin:30px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

input,select{
    width:100%;
    padding:10px;
    margin-top:5px;
}

button{
    margin-top:20px;
    padding:12px 20px;
    border:none;
    background:#1f4e79;
    color:white;
    cursor:pointer;
    border-radius:5px;
}

#resultado{
    margin-top:20px;
    font-weight:bold;
}

</style>

</head>

<body>

<header>
<h1>Painel Administrativo</h1>
</header>

<div class="container">

<label>Segmento</label> <input id="segmento" placeholder="Fundamental I">

<label>Série</label> <input id="serie" placeholder="5º Ano">

<label>Turma</label> <input id="turma" placeholder="A">

<label>Categoria de Suporte</label> <select id="categoria"> <option>Atenção</option> <option>Comunicação</option> <option>Aprendizagem</option> <option>Mobilidade</option> <option>Comportamento</option> <option>Altas habilidades</option> <option>Outro</option> </select>

<label>Nível de Suporte</label> <select id="nivel"> <option>Baixo</option> <option>Médio</option> <option>Alto</option> </select>

<label>Status</label> <select id="status"> <option>Em análise</option> <option>Ativo</option> <option>Revisar</option> <option>Encerrado</option> </select>

<button onclick="salvarRegistro()">
Salvar Registro
</button>

<div id="resultado"></div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyrvgzaBVRVy4DENuZVmB0jArdHNVVPnbQ-vu40U771XT_osQovJ0hUzD_53DhBU60q/exec";

async function salvarRegistro(){

const params = new URLSearchParams({
    action: "createRecord",
    segmento: document.getElementById("segmento").value,
    serie: document.getElementById("serie").value,
    turma: document.getElementById("turma").value,
    categoria_suporte: document.getElementById("categoria").value,
    nivel_suporte: document.getElementById("nivel").value,
    status_acompanhamento: document.getElementById("status").value
});

try{

    const resposta = await fetch(
        API_URL + "?" + params.toString()
    );

    const dados = await resposta.json();

    if(dados.success){

        document.getElementById("resultado").innerText =
        "Registro salvo com sucesso.";

    }else{

        document.getElementById("resultado").innerText =
        "Erro ao salvar.";

    }

}catch(erro){

    console.error(erro);

    document.getElementById("resultado").innerText =
    "Erro de comunicação.";

}




</script>

</body>
</html>
