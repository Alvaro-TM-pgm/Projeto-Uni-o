<!DOCTYPE html>

<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registros</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f4f6f9;
    padding:20px;
}

h1{
    color:#1f4e79;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    box-sizing:border-box;
    font-size:16px;
}

button{
    background:#1f4e79;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

.btn-excluir{
    background:#c62828;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    margin-top:15px;
}

th{
    background:#1f4e79;
    color:white;
    padding:10px;
}

td{
    padding:10px;
    border:1px solid #ddd;
}

tr:nth-child(even){
    background:#f8f8f8;
}

.acoes{
    display:flex;
    gap:5px;
}

</style>

</head>

<body>

<h1>Registros Cadastrados</h1>

<input
type="text"
id="pesquisa"
placeholder="Pesquisar..."
onkeyup="filtrarTabela()"

>

<button onclick="exportarCSV()">
    Exportar CSV
</button>

<table id="tabela">

<thead>

<tr>
    <th>ID</th>
    <th>Categoria</th>
    <th>Nível</th>
    <th>Status</th>
    <th>Ações</th>
</tr>

</thead>

<tbody>
</tbody>

</table>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbyl47X8wgNqm1GOE-e-0mgGcA5Lx_xuxwkHJZhGQhQnRNugjcJoX9h3zEfiAzpYz8Xl/exec";

async function carregar(){

    try{

        const resposta =
            await fetch(
                API_URL + "?action=records"
            );

        const dados =
            await resposta.json();

        const tbody =
            document.querySelector(
                "#tabela tbody"
            );

        tbody.innerHTML = "";

        if(!dados.success){
            return;
        }

        dados.data.forEach(linha => {

            const id =
                linha[0] || "";

            const tr =
                document.createElement("tr");

            tr.innerHTML = `
                <td>${id}</td>
                <td>${linha[5] || ""}</td>
                <td>${linha[6] || ""}</td>
                <td>${linha[11] || ""}</td>
                <td>
                    <button
                        class="btn-excluir"
                        onclick="excluirRegistro('${id}')">
                        Excluir
                    </button>
                </td>
            `;

            tbody.appendChild(tr);

        });

    }catch(erro){

        console.error(erro);

        alert(
            "Erro ao carregar registros."
        );

    }

}

function filtrarTabela(){

    const filtro =
        document.getElementById("pesquisa")
        .value
        .toLowerCase();

    const linhas =
        document.querySelectorAll(
            "#tabela tbody tr"
        );

    linhas.forEach(linha => {

        const texto =
            linha.innerText.toLowerCase();

        linha.style.display =
            texto.includes(filtro)
            ? ""
            : "none";

    });

}

function exportarCSV(){

    const tabela =
        document.getElementById("tabela");

    let csv = [];

    const linhas =
        tabela.querySelectorAll("tr");

    linhas.forEach(linha => {

        let row = [];

        linha.querySelectorAll("th,td")
        .forEach(coluna => {

            row.push(
                '"' +
                coluna.innerText.replace(/"/g,'""') +
                '"'
            );

        });

        csv.push(
            row.join(",")
        );

    });

    const conteudo =
        csv.join("\n");

    const blob =
        new Blob(
            [conteudo],
            {
                type:"text/csv;charset=utf-8;"
            }
        );

    const url =
        URL.createObjectURL(blob);

    const link =
        document.createElement("a");

    link.href = url;
    link.download = "relatorio.csv";

    document.body.appendChild(link);

    link.click();

    document.body.removeChild(link);

}

async function excluirRegistro(id){

    const confirmar =
        confirm(
            "Deseja realmente excluir este registro?"
        );

    if(!confirmar){
        return;
    }

    try{

        const resposta =
            await fetch(
                API_URL +
                "?action=deleteRecord&id=" +
                encodeURIComponent(id)
            );

        const dados =
            await resposta.json();

        if(dados.success){

            alert(
                "Registro excluído com sucesso."
            );

            carregar();

        }else{

            alert(
                dados.message ||
                "Erro ao excluir."
            );

        }

    }catch(erro){

        console.error(erro);

        alert(
            "Erro ao excluir."
        );

    }

}

carregar();

</script>

</body>

</html>
