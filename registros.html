<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registros</title>

<style>
body{
    font-family:Arial,sans-serif;
    margin:20px;
    background:#f4f6f9;
}

h1{
    color:#1f4e79;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th{
    background:#1f4e79;
    color:white;
    padding:10px;
}

td{
    padding:10px;
    border:1px solid #ddd;
}

tr:nth-child(even){
    background:#f8f8f8;
}
</style>

</head>
<body>

<h1>Registros Cadastrados</h1>

<input
    type="text"
    id="pesquisa"
    placeholder="Pesquisar..."
    onkeyup="filtrarTabela()"
    style="
        width:100%;
        padding:10px;
        margin-bottom:15px;
        font-size:16px;
    "
>

<br><br>
    
<button onclick="exportarCSV()">
    Exportar CSV
</button>

<br><br>
    
<table id="tabela">
<thead>
<tr>
<th>ID</th>
<th>Categoria</th>
<th>Nível</th>
<th>Status</th>
</tr>
</thead>

<tbody>

</tbody>
</table>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbys0ZbXlPAWeVDm_uIZkyYOnetf_rtIrQPcrsUKvDqKEFYvKBGGJS_idZcGJ1MGNcnM/exec";

async function carregar(){

    const resposta =
        await fetch(
            API_URL + "?action=records"
        );

    const dados =
        await resposta.json();

    const tbody =
        document.querySelector("#tabela tbody");

    tbody.innerHTML = "";

    if(!dados.success) return;

    dados.data.forEach(linha => {

        const tr =
            document.createElement("tr");

        tr.innerHTML = `
            <td>${linha[0] || ""}</td>
            <td>${linha[5] || ""}</td>
            <td>${linha[6] || ""}</td>
            <td>${linha[11] || ""}</td>
        `;

        tbody.appendChild(tr);

    });

}

function filtrarTabela() {

    const filtro =
        document.getElementById("pesquisa")
        .value
        .toLowerCase();

    const linhas =
        document.querySelectorAll(
            "#tabela tbody tr"
        );

    linhas.forEach(linha => {

        const texto =
            linha.innerText.toLowerCase();

        linha.style.display =
            texto.includes(filtro)
            ? ""
            : "none";
        );
        
function exportarCSV(){

    const tabela =
        document.getElementById("tabela");

    let csv = [];

    const linhas =
        tabela.querySelectorAll("tr");

    linhas.forEach(linha => {

        let row = [];

        linha.querySelectorAll("th,td")
        .forEach(coluna => {

            row.push(
                '"' +
                coluna.innerText.replace(/"/g,'""')
                + '"'
            );

        });

        csv.push(
            row.join(",")
        );

    });

    const conteudo =
        csv.join("\n");

    const blob =
        new Blob(
            [conteudo],
            {
                type:"text/csv;charset=utf-8;"
            }
        );

    const url =
        URL.createObjectURL(blob);

    const link =
        document.createElement("a");

    link.href = url;

    link.download =
        "relatorio.csv";

    link.click();

}
        
    });

}

carregar();

</script>

</body>
</html>
