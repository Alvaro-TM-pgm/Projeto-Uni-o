<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plataforma Escolar Segura</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:0;
}

header{
    background:#1f4e79;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    max-width:800px;
    margin:30px auto;
    padding:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.numero{
    font-size:48px;
    font-weight:bold;
    color:#1f4e79;
}

button{
    padding:10px 20px;
    background:#1f4e79;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

#status{
    margin-top:15px;
}
</style>

</head>
<body>

<header>
    <h1>Plataforma Escolar Segura</h1>
</header>

<div class="container">

    <div class="card">

        <h2>Total de Registros</h2>

        <div id="totalRegistros" class="numero">
            0
        </div>

        <br>

        <button onclick="carregarDashboard()">
            Atualizar
        </button>

        <div id="status"></div>

    </div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyrvgzaBVRVy4DENuZVmB0jArdHNVVPnbQ-vu40U771XT_osQovJ0hUzD_53DhBU60q/exec";

async function carregarDashboard() {

    try {

        document.getElementById("status").innerText = "Carregando...";

        const response = await fetch(
            API_URL + "?action=dashboard"
        );

        const data = await response.json();

        console.log(data);

        let total = 0;

        if (data.success && data.data) {

            for (let i = 0; i < data.data.length; i++) {

                if (data.data[i][0] === "TOTAL_REGISTROS") {

                    total = data.data[i][1];

                }

            }

        }

        document.getElementById("totalRegistros").innerText = total;

        document.getElementById("status").innerText =
            "Dados carregados com sucesso.";

    } catch (error) {

        console.error(error);

        document.getElementById("status").innerText =
            "Erro ao conectar com o Apps Script.";

    }

}

window.onload = carregarDashboard;

</script>

</body>
</html>
