<!DOCTYPE html>

<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Escolar</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
    color:#1f4e79;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:30px;
}

.card{
    background:white;
    border-radius:10px;
    padding:20px;
    text-align:center;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.card h2{
    margin:0;
    color:#1f4e79;
    font-size:18px;
}

.numero{
    margin-top:15px;
    font-size:40px;
    font-weight:bold;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

th{
    background:#1f4e79;
    color:white;
    padding:12px;
}

td{
    padding:10px;
    border:1px solid #ddd;
}

tr:nth-child(even){
    background:#f9f9f9;
}

</style>

</head>

<body>

<h1>Dashboard Escolar</h1>

<div class="cards">

```
<div class="card">
    <h2>Total de Registros</h2>
    <div id="total" class="numero">0</div>
</div>

<div class="card">
    <h2>Ativos</h2>
    <div id="ativos" class="numero">0</div>
</div>

<div class="card">
    <h2>Em Análise</h2>
    <div id="analise" class="numero">0</div>
</div>

<div class="card">
    <h2>Encerrados</h2>
    <div id="encerrados" class="numero">0</div>
</div>
```

</div>

<h2>Distribuição por Categoria</h2>

<table id="categorias">

<thead>

<tr>
<th>Categoria</th>
<th>Quantidade</th>
</tr>

</thead>

<tbody>
</tbody>

</table>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbys0ZbXlPAWeVDm_uIZkyYOnetf_rtIrQPcrsUKvDqKEFYvKBGGJS_idZcGJ1MGNcnM/exec";

async function carregarDashboard(){

    try{

        const resposta =
            await fetch(
                API_URL + "?action=records"
            );

        const dados =
            await resposta.json();

        if(!dados.success){
            return;
        }

        const registros =
            dados.data || [];

        document.getElementById("total")
            .innerText = registros.length;

        let ativos = 0;
        let analise = 0;
        let encerrados = 0;

        const categorias = {};

        registros.forEach(registro => {

            const categoria =
                registro[5] || "Não informado";

            const status =
                registro[11] || "";

            categorias[categoria] =
                (categorias[categoria] || 0) + 1;

            if(status === "Ativo"){
                ativos++;
            }

            if(status === "Em análise"){
                analise++;
            }

            if(status === "Encerrado"){
                encerrados++;
            }

        });

        document.getElementById("ativos")
            .innerText = ativos;

        document.getElementById("analise")
            .innerText = analise;

        document.getElementById("encerrados")
            .innerText = encerrados;

        const tbody =
            document.querySelector(
                "#categorias tbody"
            );

        tbody.innerHTML = "";

        Object.entries(categorias)
            .forEach(([categoria, quantidade]) => {

                const tr =
                    document.createElement("tr");

                tr.innerHTML = `
                    <td>${categoria}</td>
                    <td>${quantidade}</td>
                `;

                tbody.appendChild(tr);

            });

    }catch(erro){

        console.error(erro);

        alert(
            "Erro ao carregar dashboard."
        );

    }

}

carregarDashboard();

</script>

</body>

</html>
